name: Feature Request
description: Suggest a new feature or enhancement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to A11y Engine!

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this feature solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed Behaviour
      description: Describe how the feature should work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Crawler / Scanning
        - AI Reports
        - Issue Tracking
        - Project Management Integrations
        - Notifications
        - MCP Server
        - API / API Keys
        - Multi-Tenancy / RBAC
        - PDF Scanning
        - Performance / Lighthouse
        - UI / Frontend
        - Developer Experience
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
