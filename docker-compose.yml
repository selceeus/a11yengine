services:
    pdf-scanner:
        build:
            context: ./pdf-scanner
            dockerfile: Dockerfile
        ports:
            - "8080:8080"
        restart: unless-stopped
        environment:
            - PYTHONUNBUFFERED=1
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 10s
