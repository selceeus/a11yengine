services:
    pdf-scanner:
        image: verapdf/rest:latest
        ports:
            - "8080:8080"
            - "8081:8081"
        restart: unless-stopped
        environment:
            - JAVA_OPTS=-Xmx384m
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/api/info"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
